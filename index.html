<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>NeuraAI</title>
<meta name="theme-color" content="#E7EAF6" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="NeuraAI" />
<link rel="manifest" href='data:application/manifest+json,{"name":"NeuraAI","short_name":"NeuraAI","display":"standalone","background_color":"%23E7EAF6","theme_color":"%23E7EAF6","start_url":"."}' />
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;450;500;600&display=swap');
:root{
  --bg:#E7EAF6;--ink:#1B2133;--soft:#5A6177;--faint:#969CB0;
  --line:rgba(27,33,51,.10);--line2:rgba(27,33,51,.16);
  --glass:rgba(255,255,255,.52);--glass2:rgba(255,255,255,.72);
  --acc:#6D5EF7;--grad:linear-gradient(135deg,#7B6BFF,#A659E6);--accsoft:rgba(109,94,247,.12);
  --err:#d8506b;--ok:#179f6b;--shadow:0 14px 40px -14px rgba(31,38,80,.26);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
body::before{content:"";position:fixed;inset:-30%;z-index:0;pointer-events:none;
  background:radial-gradient(34% 30% at 18% 12%,rgba(167,139,250,.7),transparent 60%),radial-gradient(32% 28% at 84% 8%,rgba(255,165,205,.62),transparent 60%);
  filter:blur(36px) saturate(1.25);animation:bloomA 24s ease-in-out infinite alternate;}
body::after{content:"";position:fixed;inset:-30%;z-index:0;pointer-events:none;
  background:radial-gradient(40% 36% at 82% 84%,rgba(110,190,255,.62),transparent 60%),radial-gradient(38% 34% at 10% 88%,rgba(150,232,205,.6),transparent 60%);
  filter:blur(40px) saturate(1.25);animation:bloomB 30s ease-in-out infinite alternate;}
@keyframes bloomA{0%{transform:translate(0,0) scale(1) rotate(0)}100%{transform:translate(4%,5%) scale(1.15) rotate(10deg)}}
@keyframes bloomB{0%{transform:translate(0,0) scale(1.08) rotate(0)}100%{transform:translate(-5%,-4%) scale(1.2) rotate(-12deg)}}
.wrap{max-width:880px;margin:0 auto;padding:0 16px calc(28px + env(safe-area-inset-bottom));position:relative;z-index:1;}

.topbar{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.55);backdrop-filter:blur(20px) saturate(1.6);-webkit-backdrop-filter:blur(20px) saturate(1.6);border-bottom:1px solid var(--line);padding-top:env(safe-area-inset-top);}
.tin{max-width:880px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:10px;}
.brand{display:flex;align-items:center;gap:8px;font-family:'Fraunces',serif;font-weight:600;font-size:18px;letter-spacing:-.01em;cursor:pointer;color:var(--ink);}
.brand .nub{width:9px;height:9px;border-radius:50%;background:var(--grad);box-shadow:0 0 12px rgba(124,107,255,.7);}
.brand i{font-style:normal;color:var(--acc);}
.sp{flex:1;}
.iconbtn{width:36px;height:36px;border-radius:11px;border:1px solid var(--line2);background:var(--glass);color:var(--soft);cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;}
.iconbtn:hover{color:var(--acc);border-color:var(--acc);}
.iconbtn:active{transform:scale(.94);}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--grad);color:#fff;font-family:'Fraunces',serif;font-weight:600;display:flex;align-items:center;justify-content:center;cursor:pointer;}

.hero{margin:26px 0 22px;}
.rule-top{width:32px;height:1px;background:var(--grad);margin-bottom:16px;}
.eyebrow{font-size:10.5px;letter-spacing:.34em;text-transform:uppercase;color:var(--acc);font-weight:500;}
.h1{font-family:'Fraunces',serif;font-weight:600;line-height:1;font-size:clamp(30px,8.5vw,48px);letter-spacing:-.015em;margin:12px 0 12px;color:var(--ink);}
.h1 i{font-style:italic;color:var(--acc);font-weight:500;}
.lede{color:var(--soft);font-size:15px;max-width:52ch;line-height:1.6;}

.cats{display:flex;gap:8px;flex-wrap:wrap;margin:22px 0 16px;}
.cat{border:1px solid var(--line2);background:var(--glass);border-radius:20px;padding:8px 14px;font-size:13px;color:var(--soft);cursor:pointer;transition:all .15s;}
.cat:hover{color:var(--ink);border-color:var(--acc);}
.cat.on{border-color:transparent;color:#fff;background:var(--grad);font-weight:500;}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:13px;}
@media(min-width:640px){.grid{grid-template-columns:repeat(3,1fr);}}
.tool{border:1px solid var(--line);border-radius:16px;padding:18px;background:var(--glass);backdrop-filter:blur(16px) saturate(1.5);-webkit-backdrop-filter:blur(16px) saturate(1.5);box-shadow:var(--shadow);cursor:pointer;transition:transform .15s,border-color .15s;position:relative;}
.tool:hover{transform:translateY(-3px);border-color:var(--acc);}
.tool:active{transform:scale(.99);}
.tool .ico{width:42px;height:42px;border-radius:11px;background:var(--accsoft);border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;color:var(--acc);margin-bottom:12px;}
.tool h3{font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:0 0 5px;letter-spacing:-.01em;color:var(--ink);}
.tool p{color:var(--soft);font-size:12.5px;line-height:1.45;margin:0;}
.tool .ct{position:absolute;top:14px;right:14px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);}

.panel{background:var(--glass);backdrop-filter:blur(16px) saturate(1.5);-webkit-backdrop-filter:blur(16px) saturate(1.5);border:1px solid var(--line);border-radius:18px;padding:6px 18px 18px;box-shadow:var(--shadow);}
.fade{animation:in .45s cubic-bezier(.22,.7,.3,1) both;}
@keyframes in{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
.back{display:inline-flex;align-items:center;gap:7px;color:var(--soft);font-size:13.5px;cursor:pointer;margin:22px 0 4px;background:none;border:none;}
.back:hover{color:var(--acc);}
.toolhead{display:flex;align-items:center;gap:14px;margin:10px 0 6px;}
.toolhead .ico{width:46px;height:46px;border-radius:12px;background:var(--accsoft);border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;color:var(--acc);flex:none;}
.toolhead h2{font-family:'Fraunces',serif;font-size:24px;font-weight:600;margin:0;letter-spacing:-.01em;color:var(--ink);}
.toolhead p{color:var(--soft);font-size:13px;margin:3px 0 0;line-height:1.4;}

.field{margin-top:18px;}
.flabel{display:flex;align-items:baseline;gap:8px;margin-bottom:8px;}
.flabel b{font-weight:600;font-size:14px;color:var(--ink);}
.flabel small{color:var(--faint);font-weight:400;font-size:12px;}
.input,.area,select.input{width:100%;border:1px solid var(--line2);border-radius:12px;background:rgba(255,255,255,.7);padding:13px 15px;font-size:16px;font-family:inherit;color:var(--ink);outline:none;transition:border-color .18s,box-shadow .18s;line-height:1.5;}
.input::placeholder,.area::placeholder{color:var(--faint);}
.area{resize:none;overflow:hidden;min-height:54px;display:block;}
.input:focus,.area:focus,select.input:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--accsoft);}
select.input option{background:#fff;color:var(--ink);}
.seg{display:flex;flex-wrap:wrap;gap:9px;}
.segbtn{border:1px solid var(--line2);background:rgba(255,255,255,.55);border-radius:12px;padding:11px 16px;font-size:14.5px;font-weight:500;cursor:pointer;color:var(--soft);transition:all .16s;font-family:inherit;-webkit-tap-highlight-color:transparent;}
.segbtn:hover{border-color:var(--acc);color:var(--ink);}
.segbtn:active{transform:scale(.97);}
.segbtn.on{border-color:transparent;color:#fff;background:var(--grad);box-shadow:0 6px 16px -5px rgba(109,94,247,.45);}
.seg.num .segbtn{min-width:54px;text-align:center;}
.drop{display:flex;align-items:center;gap:14px;border:1.5px dashed var(--line2);border-radius:13px;padding:16px;background:rgba(255,255,255,.5);cursor:pointer;}
.drop:hover{border-color:var(--acc);}
.dropicon{width:46px;height:46px;border-radius:11px;background:var(--accsoft);border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;font-size:20px;flex:none;}
.thumb{width:52px;height:52px;border-radius:11px;object-fit:cover;flex:none;border:1px solid var(--line2);}
.droptext b{display:block;font-size:14px;color:var(--ink);}
.droptext span{font-size:12.5px;color:var(--faint);}
.xbtn{margin-left:auto;border:1px solid var(--line2);background:transparent;color:var(--acc);font-size:12.5px;cursor:pointer;font-weight:600;padding:6px 11px;border-radius:9px;}

.nav{display:flex;gap:11px;margin-top:24px;}
.btn{border:none;border-radius:14px;font-weight:600;font-size:15.5px;cursor:pointer;font-family:'Fraunces',serif;letter-spacing:.01em;padding:16px 18px;transition:transform .08s,box-shadow .2s,filter .16s;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent;}
.btn::after{content:"";position:absolute;inset:0;background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.4) 50%,transparent 70%);transform:translateX(-120%);transition:transform .6s;}
.btn:hover::after{transform:translateX(120%);}
.btn.gold{flex:1;background:var(--grad);color:#fff;box-shadow:0 12px 28px -8px rgba(109,94,247,.5),inset 0 1px 0 rgba(255,255,255,.35);}
.btn.gold:active{transform:translateY(2px) scale(.99);}
.btn.ghost{border:1px solid var(--line2);background:rgba(255,255,255,.55);color:var(--ink);flex:none;padding:16px 20px;}
.btn.ghost::after{display:none;}
.btn.ghost:hover{border-color:var(--acc);color:var(--acc);}
.btn.ghost:active{transform:translateY(2px) scale(.99);}
.btn.full{width:100%;}
.note{margin-top:14px;border-radius:11px;padding:11px 14px;font-size:13.5px;line-height:1.5;}
.note.err{border:1px solid rgba(216,80,107,.4);background:rgba(216,80,107,.1);color:#b23a54;}
.load{text-align:center;padding:54px 14px;}
.spin{width:44px;height:44px;margin:0 auto 22px;border-radius:50%;border:2px solid var(--line2);border-top-color:var(--acc);animation:rot 1s cubic-bezier(.5,.1,.4,.9) infinite;}
@keyframes rot{to{transform:rotate(360deg);}}
.load-t{font-family:'Fraunces',serif;font-style:italic;font-size:17px;color:var(--soft);}

.result{border:1px solid var(--line2);border-radius:16px;padding:20px;background:linear-gradient(160deg,rgba(124,107,255,.1),rgba(255,255,255,.6));backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);margin-top:18px;}
.result .rh{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.result .rh .eyebrow{flex:1;}
.result p{margin:0 0 9px;font-size:15px;line-height:1.6;color:var(--ink);}
.result b{color:#000;font-weight:600;}
.result ul{margin:4px 0 12px;padding-left:20px;}
.result li{font-size:15px;line-height:1.55;margin-bottom:5px;color:var(--ink);}
.smallbtn{border:1px solid var(--line2);background:rgba(255,255,255,.55);color:var(--soft);border-radius:10px;padding:8px 12px;font-size:12.5px;cursor:pointer;font-family:inherit;transition:all .15s;}
.smallbtn:hover{color:var(--acc);border-color:var(--acc);}
.smallbtn:active{transform:scale(.95);}

.concept{border:1px solid var(--line2);border-radius:18px;padding:22px 20px;margin-bottom:6px;background:linear-gradient(160deg,rgba(124,107,255,.14),rgba(255,255,255,.6));backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);}
.concept p{margin:12px 0 0;font-family:'Fraunces',serif;font-size:19px;line-height:1.45;color:var(--ink);}
.sectionlabel{display:flex;align-items:center;gap:12px;margin:30px 2px 14px;}
.sectionlabel h2{font-family:'Fraunces',serif;font-size:21px;font-weight:600;letter-spacing:-.01em;margin:0;color:var(--ink);}
.srule{flex:1;height:1px;background:var(--line);}
.idea{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--line);}
.idea:last-child{border-bottom:none;}
.idea .n{font-family:'Fraunces',serif;font-size:15px;font-weight:600;color:var(--acc);flex:none;width:26px;}
.idea .role{font-weight:600;font-size:15px;color:var(--ink);}
.idea .msg{color:var(--soft);font-size:13.5px;margin-top:3px;line-height:1.45;}
.slide{background:var(--glass);backdrop-filter:blur(16px) saturate(1.5);-webkit-backdrop-filter:blur(16px) saturate(1.5);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:16px;box-shadow:var(--shadow);}
.slide-top{display:flex;gap:18px;align-items:flex-start;}
@media(max-width:540px){.slide-top{flex-direction:column;align-items:stretch;}}
.frame{width:158px;flex:none;aspect-ratio:3/4;border-radius:11px;overflow:hidden;background:rgba(255,255,255,.6);position:relative;display:flex;flex-direction:column;border:1px solid var(--line2);}
@media(max-width:540px){.frame{width:100%;max-width:240px;margin:0 auto;}}
.corner{position:absolute;width:14px;height:14px;border:1px solid var(--acc);z-index:3;}
.corner.c1{top:7px;left:7px;border-right:none;border-bottom:none;}.corner.c2{top:7px;right:7px;border-left:none;border-bottom:none;}
.corner.c3{bottom:7px;left:7px;border-right:none;border-top:none;}.corner.c4{bottom:7px;right:7px;border-left:none;border-top:none;}
.frame .bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(80% 60% at 50% 35%,rgba(124,107,255,.14),rgba(255,255,255,.2));color:var(--faint);font-size:9px;text-transform:uppercase;letter-spacing:.18em;}
.band{position:relative;z-index:2;padding:9px;display:flex;flex-direction:column;gap:5px;}
.band.top{justify-content:flex-start;}.band.mid{flex:1;justify-content:center;}.band.bot{justify-content:flex-end;}
.zone{background:rgba(255,255,255,.8);border:1px solid var(--line2);border-radius:6px;padding:5px 7px;font-size:9.5px;line-height:1.3;color:var(--ink);}
.zone.accent{border-color:var(--acc);color:var(--acc);background:var(--accsoft);}
.slide-body{flex:1;min-width:0;}
.slide-h{display:flex;align-items:baseline;gap:11px;}
.slide-h .nn{font-family:'Fraunces',serif;color:var(--acc);font-weight:600;font-size:17px;}
.slide-h .role{font-family:'Fraunces',serif;font-weight:600;font-size:19px;letter-spacing:-.01em;color:var(--ink);}
.goal{color:var(--soft);font-size:13px;line-height:1.45;margin-top:4px;}
.headline{font-family:'Fraunces',serif;font-style:italic;font-weight:500;font-size:20px;line-height:1.2;margin:11px 0 3px;color:var(--ink);}
.sub{color:var(--soft);font-size:12.5px;line-height:1.45;}
.metarow{margin-top:13px;}
.mlabel{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--faint);margin-bottom:6px;}
.mtext{font-size:13.5px;line-height:1.5;color:var(--ink);}
.chips{display:flex;flex-wrap:wrap;gap:7px;}
.chip{background:rgba(255,255,255,.6);border:1px solid var(--line2);border-radius:7px;padding:5px 10px;font-size:12.5px;color:var(--ink);}
.chip.acc{background:var(--accsoft);border-color:var(--acc);color:var(--acc);}
.pal{display:flex;flex-wrap:wrap;gap:10px;}
.sw{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--soft);}
.swdot{width:18px;height:18px;border-radius:6px;border:1px solid var(--line2);flex:none;}

.profilecard{display:flex;align-items:center;gap:16px;margin:16px 0 6px;}
.bigava{width:64px;height:64px;border-radius:18px;flex:none;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:600;font-size:30px;color:#fff;background:var(--grad);box-shadow:0 10px 26px -8px rgba(109,94,247,.5);}
.pname{font-family:'Fraunces',serif;font-size:26px;font-weight:600;letter-spacing:-.01em;margin-top:3px;color:var(--ink);}
.pmail{color:var(--soft);font-size:13.5px;margin-top:2px;}
.cab-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px;}
.stat{border:1px solid var(--line2);border-radius:14px;padding:16px;background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
.stat .num{font-family:'Fraunces',serif;font-size:28px;font-weight:600;color:var(--acc);}
.stat .cap{font-size:12px;color:var(--soft);margin-top:2px;}
.chatlist{display:flex;flex-direction:column;gap:10px;}
.chatrow{display:flex;align-items:center;gap:13px;border:1px solid var(--line);border-radius:14px;padding:13px 14px;background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);cursor:pointer;transition:border-color .15s;}
.chatrow:hover{border-color:var(--acc);}
.chatrow .ci{width:38px;height:38px;border-radius:11px;flex:none;display:flex;align-items:center;justify-content:center;background:var(--accsoft);border:1px solid var(--line2);color:var(--acc);}
.chatrow .ci svg{width:19px;height:19px;}
.chatrow .cc{flex:1;min-width:0;}
.chatrow .ct2{font-weight:600;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink);}
.chatrow .cd{color:var(--faint);font-size:12px;margin-top:2px;}
.delx{flex:none;width:30px;height:30px;border-radius:9px;border:1px solid transparent;background:transparent;color:var(--faint);font-size:20px;line-height:1;cursor:pointer;}
.delx:hover{color:var(--err);border-color:rgba(216,80,107,.4);background:rgba(216,80,107,.1);}
.emptyhist{color:var(--soft);font-size:13.5px;border:1px dashed var(--line2);border-radius:14px;padding:20px;text-align:center;line-height:1.5;}

.overlay{position:fixed;inset:0;z-index:40;background:rgba(40,42,70,.35);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;}
@media(min-width:560px){.overlay{align-items:center;padding:16px;}}
.modal{background:var(--glass2);backdrop-filter:blur(26px) saturate(1.6);-webkit-backdrop-filter:blur(26px) saturate(1.6);border:1px solid rgba(255,255,255,.7);border-radius:20px 20px 0 0;width:100%;max-width:440px;padding:22px 20px 26px;animation:up .3s ease both;max-height:90vh;overflow:auto;box-shadow:0 24px 60px -18px rgba(31,38,80,.35);}
@media(min-width:560px){.modal{border-radius:20px;}}
@keyframes up{from{transform:translateY(20px);opacity:0;}to{transform:none;opacity:1;}}
.modal h2{font-family:'Fraunces',serif;font-size:22px;font-weight:600;margin:0 0 4px;color:var(--ink);}
.msub{color:var(--soft);font-size:13px;margin-bottom:14px;line-height:1.5;}
.authmodal{text-align:center;}
.authava{width:74px;height:74px;border-radius:21px;margin:2px auto 14px;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:600;font-size:33px;color:#fff;background:var(--grad);box-shadow:0 12px 30px -10px rgba(109,94,247,.55);transition:transform .25s cubic-bezier(.3,1.4,.5,1);}
.authava svg{width:30px;height:30px;color:#fff;}
.authmodal .field{text-align:left;margin-top:12px;}
.authmodal .input{text-align:center;}
.authnote{margin-top:16px;color:var(--faint);font-size:12px;line-height:1.5;}

/* chat */
.chat{padding-top:14px;padding-bottom:104px;}
.newchat{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line2);background:rgba(255,255,255,.55);color:var(--soft);border-radius:20px;padding:8px 14px;font-size:13px;cursor:pointer;margin:6px 0 16px;font-family:inherit;}
.newchat:hover{color:var(--acc);border-color:var(--acc);}
.msgs{display:flex;flex-direction:column;gap:16px;}
.msg{display:flex;gap:10px;}
.msg.u{flex-direction:row-reverse;}
.msg .ava{width:30px;height:30px;border-radius:9px;flex:none;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:600;font-size:13px;}
.msg.a .ava{background:var(--accsoft);border:1px solid var(--line2);color:var(--acc);}
.msg.u .ava{background:var(--grad);color:#fff;}
.bubble{padding:13px 16px;border-radius:16px;font-size:15px;line-height:1.58;max-width:80%;}
.msg.a .bubble{background:var(--glass2);backdrop-filter:blur(14px) saturate(1.4);-webkit-backdrop-filter:blur(14px) saturate(1.4);border:1px solid var(--line);border-top-left-radius:5px;color:var(--ink);box-shadow:0 6px 18px -10px rgba(31,38,80,.2);}
.msg.u .bubble{background:var(--grad);border-top-right-radius:5px;color:#fff;}
.bubble p{margin:0 0 8px;}.bubble p:last-child{margin:0;}.bubble ul{margin:5px 0;padding-left:18px;}.bubble li{margin-bottom:4px;}.bubble b{font-weight:600;}
.msg.a .bubble b{color:#000;}

const OR_URL="https://openrouter.ai/api/v1/chat/completions";
function orHeaders(){const ref=(typeof location!=="undefined"&&location.origin&&location.origin!=="null")?location.origin:"https://neuraai.app";
  return {Authorization:"Bearer "+llm.apiKey,"Content-Type":"application/json","HTTP-Referer":ref,"X-Title":"NeuraAI"};}
function orParse(d){return (d&&d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content)||"";}
async function apiText(prompt,withPhoto){
  let user=prompt;
  if(withPhoto&&state.photo&&state.photo.url)user=[{type:"text",text:prompt},{type:"image_url",image_url:{url:state.photo.url}}];
  const r=await fetch(OR_URL,{method:"POST",headers:orHeaders(),body:JSON.stringify({model:CONFIG.cloudModel,messages:[{role:"system",content:SYSTEM},{role:"user",content:user}]})});
  if(!r.ok)throw new Error("cloud "+r.status);
  return orParse(await r.json());
}
async function apiChat(history){
  const msgs=[{role:"system",content:SYSTEM}].concat(history.map((m)=>({role:m.role,content:m.content})));
  const r=await fetch(OR_URL,{method:"POST",headers:orHeaders(),body:JSON.stringify({model:CONFIG.cloudModel,messages:msgs})});
  if(!r.ok)throw new Error("cloud "+r.status);
  return orParse(await r.json());
}
async function chatLLM(history){
  if(llm.mode!=="local"&&llm.apiKey){try{const out=await apiChat(history);if(out&&out.trim())return out;}catch(e){}}
  await delay(420+Math.random()*460);return NEURA.respond(history);
}

function msgHTML(m,isLast){

function viewChat(){
  const c=currentChat();const arr=c?c.messages:[];const has=arr.length>0;const nm=firstName();
  const head=`<button class="newchat" data-action="new-chat">+ Новый чат</button>`;
  let body;
  if(!has&&!state.typing){
    body=`<div class="empty"><div class="big">${nm?"Чем помочь, "+esc(nm)+"?":"Чем помочь?"}</div><div class="esub">Спросите NeuraAI о товарах, текстах, маркетинге — о чём угодно.</div>

  }else{

  }

function revealInto(full){
  const c=currentChat();if(!c)return;const idx=c.messages.length-1;const el=$("liveMsg");
  if(!el){c.messages[idx].content=full;saveChats();return;}
  const total=full.length;let i=0;const dur=Math.min(1200,Math.max(300,total*5));const step=Math.max(2,Math.ceil(total/(dur/16)));
  clearInterval(state._rev);
  state._rev=setInterval(()=>{i+=step;c.messages[idx].content=full.slice(0,i);el.innerHTML=mdLite(c.messages[idx].content);scrollChat();
    if(i>=total){clearInterval(state._rev);c.messages[idx].content=full;el.innerHTML=mdLite(full);c.updated=Date.now();saveChats();}},16);
}
async function sendChat(text){
  text=(text||"").trim();if(!text)return;
  const c=ensureChat();c.messages.push({role:"user",content:text});
  if(c.title==="Новый чат")c.title=titleFrom(c.messages);
  c.updated=Date.now();state.typing=true;saveChats();render();
  try{
    const reply=await chatLLM(c.messages);
    state.typing=false;c.messages.push({role:"assistant",content:""});saveChats();render();revealInto(reply);
  }catch(e){state.typing=false;c.messages.push({role:"assistant",content:"⚠ "+(e.message||"Не удалось получить ответ")});saveChats();render();}
}

/* ── действия ── */
async function run(){
  const t=TOOL(state.toolId);
  const req=t.fields.filter((f)=>f.type==="input"||f.type==="area");
  if(req.length&&req.every((f)=>!String(state.form[f.key]||"").trim())){state.error="Заполните поля запроса.";render();return;}
  state.sub="loading";state.error="";render();
  let i=0;const timer=setInterval(()=>{i=(i+1)%LOAD_STEPS.length;const el=$("loadt");if(el)el.textContent=LOAD_STEPS[i];},1500);
  try{
    let done=false;
    if(llm.mode!=="local"&&llm.apiKey){
      try{const raw=await apiText(t.build(state.form),t.id==="cards");
        if(t.render==="cards")state.result=parseConcept(raw);else state.resultText=raw.trim();done=true;}
      catch(e){done=false;}
    }
    if(!done){await delay(400+Math.random()*400);const out=NEURA.tool(t,state.form);if(t.render==="cards")state.result=out;else state.resultText=String(out).trim();}
    state.sub="results";render();scrollTop();
  }catch(e){state.sub="form";state.error=e.message||"Не удалось сгенерировать";render();}
  finally{clearInterval(timer);}
}
function openTool(id){const t=TOOL(id);state.toolId=id;state.view="tool";state.sub="form";state.error="";state.result=null;state.resultText="";state.photo=null;state.drawer=false;
  state.form={};t.fields.forEach((f)=>{if(f.type==="seg")state.form[f.key]=f.def!=null?f.def:f.options[0];else if(f.type==="select")state.form[f.key]=f.options[0];else state.form[f.key]="";});
  render();scrollTop();}
function openAuth(edit){state.modal="auth";state.authEdit=!!edit;renderModal();const a=$("authName");if(a)a.focus();}
function saveAuth(){const n=($("authName")?$("authName").value:"").trim();if(!n){const e=$("authErr");if(e)e.innerHTML=`<div class="note err">Введите имя.</div>`;return;}
  state.profile={name:n,email:($("authEmail")?$("authEmail").value:"").trim()};save("neura_profile",state.profile);state.modal=null;state.authEdit=false;render();}

document.addEventListener("click",(e)=>{
  const t=e.target.closest("[data-action]");if(!t)return;

    case "close-drawer":state.drawer=false;renderDrawer();break;
    case "nav-chat":state.drawer=false;state.view="chat";render();break;

    case "go-cabinet":state.drawer=false;state.view="cabinet";render();scrollTop();break;
    case "new-chat":newChat();state.drawer=false;state.view="chat";render();break;
    case "open-chat":clearInterval(state._rev);state.currentId=v;saveChats();state.drawer=false;state.view="chat";render();break;
    case "delete-chat":e.stopPropagation();state.chats=state.chats.filter((c)=>c.id!==v);if(state.currentId===v)state.currentId=state.chats[0]?state.chats[0].id:null;saveChats();render();break;
    case "send-chat":{const ci=$("chatInput");if(ci){const val=ci.value;ci.value="";sendChat(val);}break;}
    case "suggest":sendChat(v);break;
    case "set-cat":state.cat=v;render();break;
    case "open-tool":openTool(v);break;
    case "open-settings":state.drawer=false;state.modal="settings";render();break;
    case "set-mode":llm.mode=v;saveLlm();renderModal();break;
    case "save-cfg":{const k=$("cfgKey");if(k)llm.apiKey=k.value.trim();saveLlm();state.modal=null;renderModal();break;}
    case "edit-profile":openAuth(true);break;
    case "save-auth":saveAuth();break;
    case "set-field":state.form[t.dataset.key]=isNaN(Number(v))?v:Number(v);render();break;
    case "run":run();break;
    case "pick-photo":{const fi=$("fileInput");if(fi)fi.click();break;}
    case "clear-photo":e.stopPropagation();state.photo=null;render();break;
    case "copy":navigator.clipboard&&navigator.clipboard.writeText(state.resultText);t.textContent="Скопировано ✓";setTimeout(()=>{t.textContent="Скопировать";},1500);break;
    case "download":{const blob=new Blob([state.resultText],{type:"text/plain;charset=utf-8"});const u=URL.createObjectURL(blob);const l=document.createElement("a");l.href=u;l.download="neura.txt";l.click();URL.revokeObjectURL(u);break;}
    case "logout":state.profile=null;save("neura_profile",null);state.drawer=false;state.view="chat";render();break;
  }
});

document.addEventListener("keydown",(e)=>{
  if(e.target&&e.target.id==="chatInput"&&e.key==="Enter"&&!e.shiftKey){e.preventDefault();const val=e.target.value;e.target.value="";sendChat(val);}
  if(e.target&&(e.target.id==="authName"||e.target.id==="authEmail")&&e.key==="Enter"){e.preventDefault();saveAuth();}
});
document.addEventListener("change",(e)=>{if(e.target.id==="fileInput"){const file=e.target.files&&e.target.files[0];if(!file)return;const r=new FileReader();r.onload=()=>{const url=r.result;state.photo={url,b64:String(url).split(",")[1],mime:file.type||"image/jpeg"};render();};r.readAsDataURL(file);}});
let _tsx=0,_tsy=0,_tr=false;
document.addEventListener("touchstart",(e)=>{const t=e.touches[0];_tsx=t.clientX;_tsy=t.clientY;_tr=true;},{passive:true});
document.addEventListener("touchend",(e)=>{if(!_tr||!state.profile){_tr=false;return;}_tr=false;const t=e.changedTouches[0];const dx=t.clientX-_tsx,dy=t.clientY-_tsy;if(Math.abs(dx)<55||Math.abs(dy)>45)return;if(dx>0&&_tsx<44&&!state.drawer){state.drawer=true;renderDrawer();}else if(dx<0&&state.drawer){state.drawer=false;renderDrawer();}},{passive:true});

render();
</script>
</body>
</html>
